name: "Training"
description: "Fitness training planner and tracker with AI coach"
version: "1.0.0"
slug: "training"
arch:
  - aarch64
  - amd64
image: "ghcr.io/tma84/ha-addon-training-{arch}"
url: "https://github.com/TMA84/ha-addons"
startup: services
init: false
webui: "http://[HOST]:[PORT:3001]/"
panel_icon: mdi:dumbbell
ports:
  3001/tcp: 3001
ingress: false
map:
  - share:rw
options:
  openai_api_key: ""
  openai_model: "gpt-4o-mini"
schema:
  openai_api_key: str?
  openai_model: str?
configuration:
  openai_api_key:
    name: OpenAI API Key
    description: "Optional: API key for AI coach features. Can also be set in the web UI."
  openai_model:
    name: OpenAI Model
    description: "AI model to use (default: gpt-4o-mini)"
