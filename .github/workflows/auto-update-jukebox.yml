name: Auto-update SONOS-Jukebox addon

on:
  repository_dispatch:
    types: [jukebox-release]

permissions:
  contents: write
  packages: write

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get new version
        id: version
        run: |
          NEW_VERSION="${{ github.event.client_payload.version }}"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          OLD_VERSION=$(grep '^version:' SONOS-Jukebox/config.yaml | sed -E 's/version:[[:space:]]*"?([^" ]+)"?/\1/')
          echo "old=$OLD_VERSION" >> $GITHUB_OUTPUT
          echo "Updating from $OLD_VERSION to $NEW_VERSION"

      - name: Update config.yaml version
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.version.outputs.new }}\"/" SONOS-Jukebox/config.yaml

      - name: Update build.yaml JUKEBOX_VERSION
        run: |
          sed -i "s/JUKEBOX_VERSION: .*/JUKEBOX_VERSION: ${{ steps.version.outputs.new }}/" SONOS-Jukebox/build.yaml

      - name: Commit version update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add SONOS-Jukebox/config.yaml SONOS-Jukebox/build.yaml
          git commit -m "chore: update SONOS-Jukebox to v${{ steps.version.outputs.new }}"
          git push

  build:
    needs: update-and-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            build_from: ghcr.io/home-assistant/aarch64-base:3.22
            platform: linux/arm64
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.22
            platform: linux/amd64
          - arch: armv7
            build_from: ghcr.io/home-assistant/armv7-base:3.22
            platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve metadata
        id: meta
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "owner_lc=${OWNER_LC}" >> "${GITHUB_OUTPUT}"

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: ./SONOS-Jukebox
          file: ./SONOS-Jukebox/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            JUKEBOX_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/ha-addon-sonos-jukebox-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/ha-addon-sonos-jukebox-${{ matrix.arch }}:latest
