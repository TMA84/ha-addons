name: Build and publish ebusd addon image

on:
  push:
    branches:
      - main
    paths:
      - ebusd/**
      - .github/workflows/build-ebusd-ghcr.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            build_from: ghcr.io/home-assistant/aarch64-base:3.21
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.21
          - arch: armhf
            build_from: ghcr.io/home-assistant/armhf-base:3.21
          - arch: armv7
            build_from: ghcr.io/home-assistant/armv7-base:3.21
          - arch: i386
            build_from: ghcr.io/home-assistant/i386-base:3.21

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' ebusd/config.yaml | sed -E 's/version:[[:space:]]*"?([^" ]+)"?/\1/')
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "owner_lc=${OWNER_LC}" >> "${GITHUB_OUTPUT}"

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: ./ebusd
          file: ./ebusd/Dockerfile
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/ha-addon-ebusd-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/ha-addon-ebusd-${{ matrix.arch }}:latest
