name: Build and publish SONOS-Jukebox addon image

on:
  push:
    branches:
      - main
    paths:
      - SONOS-Jukebox/**
      - .github/workflows/build-sonos-jukebox-ghcr.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            build_from: ghcr.io/home-assistant/aarch64-base:3.22
            platform: linux/arm64
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.22
            platform: linux/amd64
          - arch: armv7
            build_from: ghcr.io/home-assistant/armv7-base:3.22
            platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' SONOS-Jukebox/config.yaml | sed -E 's/version:[[:space:]]*"?([^" ]+)"?/\1/')
          CACHEBUST=$(grep 'CACHEBUST:' SONOS-Jukebox/build.yaml | sed -E 's/.*CACHEBUST:[[:space:]]*([0-9]+)/\1/' | head -n1)
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "cachebust=${CACHEBUST:-1}" >> "${GITHUB_OUTPUT}"
          echo "owner_lc=${OWNER_LC}" >> "${GITHUB_OUTPUT}"

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: ./SONOS-Jukebox
          file: ./SONOS-Jukebox/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            CACHEBUST=${{ steps.meta.outputs.cachebust }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/ha-addon-sonos-jukebox-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/ha-addon-sonos-jukebox-${{ matrix.arch }}:latest
